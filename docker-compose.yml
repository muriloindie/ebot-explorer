version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebot-site
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-5546999130505}
      - SITE_URL=${SITE_URL:-https://ebot.murilosilva.com}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
